<p class="not-inset">This is an example of this formatting system.</p>
<p>Italics: <i>like this</i>.</p>
<p>Bold: <b>like this</b>.</p>
<p>Bold italics: <b><i>like this</i></b>.</p>
<p>Underlined: <u>like this</u>.</p>
<p>Struckthrough: <s>like this</s>.</p>
<p>Small caps: <span class="small-caps">like this</span>.</p>
